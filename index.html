<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Base64 SVG Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px;
            max-width: 800px;
            margin: auto;
            background-color: #f5f7fa;
            color: #333;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        textarea {
            width: 100%;
            height: 300px;
            margin-top: 15px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        #downloadBtn {
            background-color: #2ecc71;
        }

        #downloadBtn:hover {
            background-color: #27ae60;
        }

        input[type="file"] {
            margin: 15px 0;
            padding: 10px;
            border: 1px dashed #3498db;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            background: #f9fbfd;
        }

        #previewContainer {
            margin-top: 20px;
            border: 1px dashed #bdc3c7;
            padding: 10px;
            text-align: center;
            background-color: #ecf0f1;
            border-radius: 5px;
            display: none;
        }

        #previewContainer h3 {
            margin-top: 0;
            color: #7f8c8d;
        }

        #previewContainer svg {
            max-width: 100%;
            height: auto;
            max-height: 400px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🪙 Fast SVG Base64 Converter</h2>
        <p>Since I don't have direct access to save the image from our chat to your local disk, I've created this quick
            utility. <strong>Select your coin image</strong> below, and it will instantly generate the fast-loading
            Base64 SVG code you requested.</p>

        <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp" />

        <div class="controls">
            <button id="copyBtn">Copy SVG to Clipboard</button>
            <button id="downloadBtn">Download .svg file</button>
        </div>

        <textarea id="svgOutput" placeholder="Your generated SVG code will appear here..."></textarea>

        <div id="previewContainer"></div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const svgOutput = document.getElementById('svgOutput');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewContainer = document.getElementById('previewContainer');

        let currentSvg = '';

        imageInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                const base64Data = event.target.result;

                // Get real image dimensions to set viewBox properly
                const img = new Image();
                img.onload = function () {
                    const width = img.width;
                    const height = img.height;

                    currentSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" width="100%" height="100%">
  <image href="${base64Data}" width="${width}" height="${height}" />
</svg>`;

                    svgOutput.value = currentSvg;
                    previewContainer.innerHTML = '<h3>Live Preview</h3>' + currentSvg;
                    previewContainer.style.display = 'block';
                };
                img.src = base64Data;
            };
            reader.readAsDataURL(file);
        });

        copyBtn.addEventListener('click', function () {
            if (!currentSvg) {
                alert('Please upload an image first.');
                return;
            }
            svgOutput.select();
            document.execCommand('copy');
            alert('SVG copied to clipboard!');
        });

        downloadBtn.addEventListener('click', function () {
            if (!currentSvg) {
                alert('Please upload an image first.');
                return;
            }
            const blob = new Blob([currentSvg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'coin_base64.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>

</html>
